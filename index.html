<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>退職届ジェネレーター</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700;800&family=Zen+Kaku+Gothic+New:wght@500;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
<style>
  :root{
    --paper:#F4F4F2;
    --ink:#161616;
    --ink-soft:#666666;
    --red:#B23A2E;
    --line:#D4D4D1;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;padding:0;
    height:100%; height:100dvh;
    background:var(--paper);
    color:var(--ink);
    font-family:'Zen Kaku Gothic New', sans-serif;
    -webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  body{
    display:flex;
    flex-direction:column;
    align-items:center;
    height:100%; height:100dvh;
    padding:10px 14px 8px;
    overflow:hidden;
  }
  h1{
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:11px;
    margin:0 0 5px;
    letter-spacing:.06em;
    flex-shrink:0;
  }

  /* ---- 退職届(A4比率) ---- */
  .doc-wrap{
    width:100%;
    max-width:400px;
    cursor:pointer;
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    container-type:size;
    position:relative;
  }
  .doc-wrap:active .doc{
    transform:scale(.99);
  }
  /* でき上がった書類の画像を、元の書類にぴったり重ねて表示（長押し/右クリックで保存） */
  #docImage{
    position:absolute;
    z-index:5;
    box-shadow:0 1px 3px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.06);
    -webkit-touch-callout:default; /* 長押しで「画像を保存」メニューを出す（user-selectは付けないこと） */
  }
  .doc{
    background:#FFFFFF;
    border:1px solid #C9C9C9;
    border-radius:0;
    width:auto;
    height:100%;
    max-width:100%;
    aspect-ratio:210 / 297;
    padding:7% 9%;
    display:flex;
    flex-direction:column;
    writing-mode:vertical-rl;
    text-orientation:mixed;
    -webkit-user-select:none; /* 書類の文字を選択不可にし、長押しでテキストコピーされるのを防ぐ */
    user-select:none;
    box-shadow:0 1px 3px rgba(0,0,0,.08), 0 8px 20px rgba(0,0,0,.06);
    transition:transform .08s ease;
    font-size:2.124cqh;
  }
  .doc-title{
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-weight:700;
    font-size:1.4em;
    letter-spacing:.6em;
    text-indent:.6em;
    align-self:center;
    margin-left:4%;
  }
  .doc-line{
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:1em;
    line-height:1.9;
    letter-spacing:.06em;
    color:var(--ink);
    align-self:flex-start;
    margin-right:6%;
    white-space:nowrap;
  }
  .preamble{
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:1em;
    letter-spacing:.06em;
    color:var(--ink);
    align-self:flex-end;
    margin-right:4%;
    margin-bottom:4%;
  }
  .closing{
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:1em;
    letter-spacing:.06em;
    color:var(--ink);
    align-self:flex-end;
    margin-right:6%;
    margin-bottom:4%;
  }
  .slot{
    display:inline-block;
    font-weight:800;
    min-width:1.4em;
  }
  .slot.spinning{
    animation:slotFlicker .09s linear infinite;
  }
  @keyframes slotFlicker{
    0%{opacity:.35; transform:translateY(-2px);}
    50%{opacity:1; transform:translateY(0);}
    100%{opacity:.35; transform:translateY(2px);}
  }
  .date-col{
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:1em;
    letter-spacing:.06em;
    color:var(--ink);
    align-self:flex-start;
    margin-right:10%;
  }
  .sign-col{
    position:relative;
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-size:1em;
    letter-spacing:.06em;
    color:var(--ink);
    align-self:flex-end;
    margin-right:4%;
    margin-bottom:4%;
  }
  .stamp{
    position:absolute;
    top:100%;
    left:50%;
    display:inline-flex;
    width:30px;
    height:30px;
    border:2.5px solid var(--red);
    border-radius:50%;
    color:var(--red);
    align-items:center;
    justify-content:center;
    text-align:center;
    white-space:nowrap;
    font-family:'Shippori Mincho', serif;
    font-weight:800;
    font-size:10px;
    text-orientation:upright;
    transform:translate(-50%,6px) scale(2.2) rotate(-14deg);
    opacity:0;
    mix-blend-mode:multiply;
  }
  .stamp.show{
    animation:stampDown .35s cubic-bezier(.2,.9,.3,1.2) forwards;
  }
  @keyframes stampDown{
    0%{transform:translate(-50%,6px) scale(2.2) rotate(-14deg);opacity:0;}
    60%{transform:translate(-50%,6px) scale(.9) rotate(-14deg);opacity:1;}
    100%{transform:translate(-50%,6px) scale(1) rotate(-14deg);opacity:1;}
  }

  /* ---- 仕上げ入力(所属・氏名) ---- */
  .finish{
    width:100%;
    max-width:400px;
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    margin-bottom:4px;
  }
  .finish label{
    display:flex;
    flex-direction:column;
    gap:2px;
    font-size:9px;
    color:var(--ink-soft);
    font-weight:700;
    letter-spacing:.04em;
  }
  .finish label.full{
    flex:1 1 100%;
  }
  .finish label.half{
    flex:1 1 calc(50% - 5px);
  }
  .finish input{
    font-family:'Zen Kaku Gothic New', sans-serif;
    font-size:10px;
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:0;
    background:#FFFFFF;
    color:var(--ink);
  }
  .finish input:focus{
    outline:2px solid var(--ink);
    outline-offset:1px;
  }

  .actions{
    width:100%;
    max-width:400px;
    margin-top:6px;
    flex-shrink:0;
  }
  #saveHint{
    margin:0;
    text-align:center;
    font-family:'Yu Mincho','YuMincho','Hiragino Mincho ProN','MS Mincho',serif;
    font-weight:700;
    font-size:12px;
    letter-spacing:.04em;
    color:var(--ink-soft);
  }
</style>
</head>
<body>

  <h1>退職届ジェネレーター</h1>

  <div class="finish" id="finishArea">
    <label class="full">所属<input type="text" id="deptInput" placeholder="例：営業部"></label>
    <label class="half">苗字<input type="text" id="surnameInput" placeholder="例：山田"></label>
    <label class="half">名前<input type="text" id="givenInput" placeholder="例：太郎"></label>
  </div>

  <div class="doc-wrap" id="docWrap">
    <div class="doc" id="docCard">
      <div class="doc-title">退職届</div>
      <div class="preamble">私儀</div>
      <div class="doc-line">
        この度、<span class="slot spinning" id="slotA">？</span> の <span class="slot spinning" id="slotB">？</span> のため<br>
        <span id="bodyDateText">2026年7月3日</span>をもって退職したく、ここにお願い申し上げます。
      </div>
      <div class="closing">以上</div>
      <div class="date-col" id="dateText">2026年7月3日</div>
      <div class="sign-col" id="signLine"><span id="deptText">◯◯◯◯</span>　<span id="nameText">◯◯◯◯</span><span class="stamp" id="stamp">印</span></div>
    </div>
  </div>

  <div class="actions" id="actionsArea">
    <p id="saveHint">書類を長押しで写真に保存（PCは右クリック）</p>
  </div>

<script>
const A = (window.WORD_DATA && window.WORD_DATA.A) || [];
const B = (window.WORD_DATA && window.WORD_DATA.B) || [];

const slotA = document.getElementById('slotA');
const slotB = document.getElementById('slotB');
const docWrap = document.getElementById('docWrap');
const dateText = document.getElementById('dateText');
const bodyDateText = document.getElementById('bodyDateText');
const deptText = document.getElementById('deptText');

const givenInput = document.getElementById('givenInput');
const stamp = document.getElementById('stamp');
const finishArea = document.getElementById('finishArea');
const actionsArea = document.getElementById('actionsArea');
const saveHint = document.getElementById('saveHint');
const docCard = document.getElementById('docCard');

let phase = 0; // 0: 両方回転中, 1: Aのみ確定・B回転中, 2: 両方確定
let pickedA = "", pickedB = "";
let ivA = null, ivB = null;
let docImage = null, rerenderTimer = null;

// でき上がった書類を画像化し、元の書類にぴったり重ねて表示する。
// 表示されるのは本物の<img>なので、長押し（PCは右クリック）で写真に保存できる。
function renderDocImage(){
  // html-to-image はブラウザ自身の描画(SVG foreignObject)を使うため、縦書きやハンコの位置も正しく保たれる
  const c = docCard.getBoundingClientRect();
  htmlToImage.toPng(docCard, {
    pixelRatio: 3,
    backgroundColor: '#FFFFFF',
    width: c.width,
    height: c.height,
    skipFonts: true // Webフォント取り込みでiOSが失敗するのを回避（本文はシステム明朝で描画される）
  }).then(dataUrl=>{
    if(phase !== 2) return; // 途中でリセットされたら破棄
    if(!docImage){
      docImage = document.createElement('img');
      docImage.id = 'docImage';
      docImage.alt = '退職届';
      docWrap.appendChild(docImage);
    }
    const w = docWrap.getBoundingClientRect(), cc = docCard.getBoundingClientRect();
    docImage.src = dataUrl;
    docImage.style.left   = (cc.left - w.left) + 'px';
    docImage.style.top    = (cc.top  - w.top ) + 'px';
    docImage.style.width  = cc.width  + 'px';
    docImage.style.height = cc.height + 'px';
  }).catch(()=>{});
}
function removeDocImage(){ if(docImage){ docImage.remove(); docImage = null; } }
// 氏名などの編集中は一旦ライブ表示に戻し、手が止まったら画像を作り直す
function refreshDocImage(){
  if(phase !== 2) return;
  removeDocImage();
  clearTimeout(rerenderTimer);
  rerenderTimer = setTimeout(renderDocImage, 400);
}
window.addEventListener('resize', refreshDocImage);

function pick(list){ return list[Math.floor(Math.random()*list.length)]; }

function startSpin(el, list){
  return setInterval(()=>{ el.textContent = pick(list); }, 80);
}

function startReels(){
  slotA.classList.add('spinning');
  slotB.classList.add('spinning');
  ivA = startSpin(slotA, A);
  ivB = startSpin(slotB, B);
}

const kanjiDigits = ['〇','一','二','三','四','五','六','七','八','九'];
function yearToKanji(y){
  return String(y).split('').map(d=>kanjiDigits[parseInt(d,10)]).join('');
}
function numToKanji(n){
  if(n < 10) return kanjiDigits[n];
  if(n === 10) return '十';
  if(n < 20) return '十' + kanjiDigits[n % 10];
  const tens = Math.floor(n / 10), ones = n % 10;
  return kanjiDigits[tens] + '十' + (ones > 0 ? kanjiDigits[ones] : '');
}
function todayLabel(){
  const d = new Date();
  return yearToKanji(d.getFullYear()) + "年" + numToKanji(d.getMonth()+1) + "月" + numToKanji(d.getDate()) + "日";
}
dateText.textContent = todayLabel();
bodyDateText.textContent = todayLabel();

startReels();

docWrap.addEventListener('click', ()=>{
  if(phase === 0){
    clearInterval(ivA);
    slotA.classList.remove('spinning');
    pickedA = pick(A);
    slotA.textContent = pickedA;
    phase = 1;
  } else if(phase === 1){
    clearInterval(ivB);
    slotB.classList.remove('spinning');
    pickedB = pick(B);
    slotB.textContent = pickedB;
    phase = 2;
    revealFinish();
  } else if(phase === 2){
    resetToSpinning();
  }
});

function revealFinish(){
  stamp.classList.remove('show');
  void stamp.offsetWidth;
  setTimeout(()=>{ stamp.classList.add('show'); }, 300);
  renderDocImage();                // すぐ画像化して長押し可能に（この時点ではハンコ未表示）
  setTimeout(renderDocImage, 800);  // ハンコアニメ後にもう一度作り直してハンコを反映
}

function resetToSpinning(){
  phase = 0;
  pickedA = ""; pickedB = "";
  removeDocImage();
  stamp.classList.remove('show');
  startReels();
}

// 全角文字を2、半角文字を1として数え、上限(幅の単位)を超えたら切り詰める
function charWidth(ch){
  const code = ch.codePointAt(0);
  return code > 0xFF ? 2 : 1; // 半角英数・記号は1、それ以外(全角)は2として扱う
}
function clampByWidth(str, maxUnits){
  let units = 0, result = '';
  for(const ch of str){
    units += charWidth(ch);
    if(units > maxUnits) break;
    result += ch;
  }
  return result;
}
function enforceWidth(input, maxUnits){
  const clamped = clampByWidth(input.value, maxUnits);
  if(clamped !== input.value) input.value = clamped;
}

function syncNames(){
  enforceWidth(deptInput, 48);
  enforceWidth(surnameInput, 24);
  enforceWidth(givenInput, 24);
  deptText.textContent = deptInput.value.trim() || "◯◯◯◯";
  const surname = surnameInput.value.trim();
  const given = givenInput.value.trim();
  nameText.textContent = (surname || given) ? (surname + " " + given) : "◯◯ ◯◯";
  if(surname){
    const shown = surname.slice(0, 4);
    stamp.innerHTML = '';
    if(shown.length <= 3){
      stamp.appendChild(document.createTextNode(shown));
      stamp.style.fontSize = (shown.length <= 2 ? 10 : 8) + "px";
    } else {
      stamp.appendChild(document.createTextNode(shown.slice(0, 2)));
      stamp.appendChild(document.createElement('br'));
      stamp.appendChild(document.createTextNode(shown.slice(2, 4)));
      stamp.style.fontSize = "8px";
    }
  } else {
    stamp.textContent = "印";
    stamp.style.fontSize = "10px";
  }
  refreshDocImage(); // 確定後(phase2)に氏名を変えたら画像を作り直す
}

surnameInput.addEventListener('input', syncNames);
givenInput.addEventListener('input', syncNames);
syncNames();
deptInput.addEventListener('click', (e)=> e.stopPropagation());
surnameInput.addEventListener('click', (e)=> e.stopPropagation());
givenInput.addEventListener('click', (e)=> e.stopPropagation());
